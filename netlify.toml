[build]
  command = "npm run build"

[build.environment]
  # Next 16 exige Node >= 20.9 ; on force 22 (la valeur par défaut de Netlify
  # peut être plus ancienne selon l'âge du site).
  NODE_VERSION = "22"

# Runtime officiel Next.js de Netlify. La version effective vient de la
# devDependency @netlify/plugin-nextjs si elle est installée, sinon Netlify
# installe la dernière compatible.
[[plugins]]
  package = "@netlify/plugin-nextjs"
